<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fintech Receipt Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1f1f1f,#3a3a3a);
    padding:15px;
    color:#333;
}

.container{
    background:white;
    padding:20px;
    border-radius:15px;
    max-width:420px;
    margin:auto;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.generate-btn{background:black;color:white;}
.print-btn{background:#007bff;color:white;}
.pdf-btn{background:#28a745;color:white;}
.verify-btn{background:#6c757d;color:white;}

button:hover{opacity:0.8;}

#receipt{
    margin-top:20px;
}

.receipt-box{
    padding:20px;
    border-radius:15px;
    background:#fff;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    animation:fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0;transform:scale(0.95);}
    to{opacity:1;transform:scale(1);}
}

.status{
    color:green;
    font-weight:bold;
}

.footer{
    font-size:11px;
    text-align:center;
    opacity:0.6;
    margin-top:10px;
}
hr{border:none;border-top:1px solid #ddd;}
</style>
</head>
<body>

<div class="container">
<h2>Multi‑Bank Receipt Generator</h2>

<select id="bank">
<option>PalmPay</option>
<option>OPay</option>
<option>Kuda</option>
<option>Access Bank</option>
</select>

<input type="text" id="sender" placeholder="Sender Name">
<input type="text" id="receiver" placeholder="Receiver Name">
<input type="number" id="amount" placeholder="Amount">
<input type="text" id="narration" placeholder="Narration">

<button class="generate-btn" onclick="generateReceipt()">Generate Receipt</button>
<button class="print-btn" onclick="printReceipt()">Print</button>
<button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>

<hr>

<input type="text" id="verifyInput" placeholder="Enter Transaction ID to Verify">
<button class="verify-btn" onclick="verifyReceipt()">Verify Receipt</button>

<div id="receipt"></div>
</div>

<script>

let storedReceipts = {};

function generateID(){
    return "TXN" + Date.now() + Math.floor(Math.random()*1000);
}

function generateReceipt(){

    let bank = document.getElementById("bank").value;
    let sender = document.getElementById("sender").value;
    let receiver = document.getElementById("receiver").value;
    let amount = document.getElementById("amount").value;
    let narration = document.getElementById("narration").value;

    if(!sender || !receiver || !amount){
        alert("Please fill all fields");
        return;
    }

    let date = new Date().toLocaleString();
    let txnID = generateID();

    let color;

    if(bank=="PalmPay"){ color="#6a0dad"; }
    else if(bank=="OPay"){ color="#00a859"; }
    else if(bank=="Kuda"){ color="#4b0082"; }
    else if(bank=="Access Bank"){ color="#ff6600"; }

    storedReceipts[txnID] = true;

    document.getElementById("receipt").innerHTML = `
        <div class="receipt-box" style="border-top:6px solid ${color};">
            <h2 style="color:${color};">${bank}</h2>
            <h3>₦${amount}.00</h3>
            <p class="status">Successful</p>
            <p>${date}</p>
            <hr>
            <p><strong>Sender:</strong> ${sender}</p>
            <p><strong>Receiver:</strong> ${receiver}</p>
            <p><strong>Narration:</strong> ${narration}</p>
            <hr>
            <p><strong>Transaction ID:</strong> ${txnID}</p>
            <div class="footer">
                Academic Project – Receipt Simulation System
            </div>
        </div>
    `;
}

function printReceipt(){
    window.print();
}

function downloadPDF(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    doc.text(document.getElementById("receipt").innerText, 10, 10);
    doc.save("receipt.pdf");
}

function verifyReceipt(){
    let input = document.getElementById("verifyInput").value;

    if(storedReceipts[input]){
        alert("Receipt Verified ✅");
    } else {
        alert("Transaction ID Not Found ❌");
    }
}

</script>

</body>
</html>
